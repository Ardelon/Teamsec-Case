<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}External Bank Simulator{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-emerald-800 text-white px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-semibold">External Bank Simulator</h1>
            <p class="text-sm text-emerald-100">CSV portfolio upload &amp; download</p>
        </div>
        <a href="/" class="text-sm text-emerald-100 hover:text-white">Portal</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
