{% extends "base.html" %}
{% block title %}Login - TeamSec{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8 mt-10">
    <h2 class="text-2xl font-bold mb-6">Operator Login</h2>
    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700">Username</label>
            <input id="username" type="text" class="mt-1 w-full border rounded px-3 py-2" required autocomplete="username">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input id="password" type="password" class="mt-1 w-full border rounded px-3 py-2" required autocomplete="current-password">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700">Tenant</label>
            <select id="tenant_id" class="mt-1 w-full border rounded px-3 py-2">
                <option value="BANK001">BANK001</option>
                <option value="BANK002">BANK002</option>
                <option value="BANK003">BANK003</option>
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Sign In</button>
        <p id="login-error" class="text-red-600 text-sm hidden"></p>
    </form>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('login-error');
    errorEl.classList.add('hidden');
    const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        tenant_id: document.getElementById('tenant_id').value,
    };
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            ...csrfHeaders(),
        },
        credentials: 'same-origin',
        body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) {
        errorEl.textContent = data.error || 'Login failed';
        errorEl.classList.remove('hidden');
        return;
    }
    window.location.href = '/dashboard/';
});
</script>
{% endblock %}
