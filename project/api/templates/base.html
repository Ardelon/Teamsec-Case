<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TeamSec Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-100 min-h-screen">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold text-slate-800">TeamSec ETL Platform</h1>
        <div id="nav-auth" class="text-sm text-slate-600"></div>
    </nav>
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
    <script>
        function authHeaders() {
            const token = localStorage.getItem('jwt_token');
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }
        function requireAuth() {
            if (!localStorage.getItem('jwt_token')) {
                window.location.href = '/login/';
            }
        }
        document.body.addEventListener('htmx:configRequest', (event) => {
            Object.assign(event.detail.headers, authHeaders());
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
