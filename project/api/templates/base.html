<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TeamSec Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="w-full min-h-screen bg-slate-50/40 text-slate-800 antialiased font-sans">
    <nav class="w-full bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between shadow-sm">
        <h1 class="text-xl font-semibold text-slate-800">TeamSec ETL Platform</h1>
        <div class="flex items-center gap-3 ml-auto">
            <div id="nav-auth" class="hidden items-center gap-2">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Bank</span>
                <span id="nav-tenant" class="text-sm font-extrabold text-slate-900 tracking-tight bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg"></span>
            </div>
            <button id="logout-btn" type="button"
                    class="hidden text-xs font-bold text-rose-600 hover:text-white hover:bg-rose-600 border border-rose-200 hover:border-rose-600 px-3.5 py-1.5 rounded-lg transition-all">
                Logout
            </button>
        </div>
    </nav>
    <main class="w-full">
        {% block content %}{% endblock %}
    </main>
    <script>
        function authHeaders() {
            const token = localStorage.getItem('jwt_token');
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }
        function requireAuth() {
            if (!localStorage.getItem('jwt_token')) {
                window.location.href = '/login/';
            }
        }
        function logout() {
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('tenant_id');
            window.location.href = '/login/';
        }
        function updateNavAuth() {
            const navAuth = document.getElementById('nav-auth');
            const navTenant = document.getElementById('nav-tenant');
            const logoutBtn = document.getElementById('logout-btn');
            const tenantId = localStorage.getItem('tenant_id');
            const token = localStorage.getItem('jwt_token');
            if (!navAuth || !logoutBtn || !navTenant) {
                return;
            }
            if (token) {
                navTenant.textContent = tenantId || '—';
                navAuth.classList.remove('hidden');
                navAuth.classList.add('flex');
                logoutBtn.classList.remove('hidden');
            } else {
                navTenant.textContent = '';
                navAuth.classList.add('hidden');
                navAuth.classList.remove('flex');
                logoutBtn.classList.add('hidden');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            updateNavAuth();
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', logout);
            }
        });
        document.body.addEventListener('htmx:configRequest', (event) => {
            Object.assign(event.detail.headers, authHeaders());
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
