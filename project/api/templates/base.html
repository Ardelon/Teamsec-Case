<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teamsec ETL Platform</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; background: #f4f6f8; }
        .card { background: #fff; padding: 1.5rem; border-radius: 8px; max-width: 640px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        label { display: block; margin-top: .75rem; font-weight: 600; }
        input, select { width: 100%; padding: .5rem; margin-top: .25rem; }
        button { margin-top: 1rem; padding: .6rem 1.2rem; background: #1a56db; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 1rem; padding: 1rem; background: #eef2ff; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Teamsec Multi-Tenant ETL</h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
