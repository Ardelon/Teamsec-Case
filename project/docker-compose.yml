services:
  postgres_warehouse:
    image: postgres:15-alpine
    container_name: postgres_warehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamsec_secret}
      POSTGRES_DB: ${POSTGRES_DB:-teamsec_warehouse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - teamsec_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamsec} -d ${POSTGRES_DB:-teamsec_warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_broker:
    image: redis:7-alpine
    container_name: redis_broker
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - teamsec_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  external_bank_sim:
    build:
      context: ./external_bank
      dockerfile: Dockerfile
    container_name: external_bank_sim
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: bank.settings
      DJANGO_SECRET_KEY: ${EXTERNAL_BANK_SECRET_KEY:-external-bank-dev-secret}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: externalbank,external_bank_sim,localhost,127.0.0.1,*
    volumes:
      - ./external_bank:/app
    ports:
      - "8080:8080"
    networks:
      teamsec_network:
        aliases:
          - externalbank
    depends_on:
      postgres_warehouse:
        condition: service_healthy

  core_backend_api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: core_backend_api
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-teamsec-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      POSTGRES_HOST: postgres_warehouse
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-teamsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamsec_secret}
      POSTGRES_DB: ${POSTGRES_DB:-teamsec_warehouse}
      REDIS_URL: redis://redis_broker:6379/0
      CELERY_BROKER_URL: redis://redis_broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis_broker:6379/1
      EXTERNAL_BANK_URL: http://externalbank:8080
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret}
    volumes:
      - ./api:/app/api
      - ./adapter:/app/adapter
    ports:
      - "8000:8000"
    networks:
      - teamsec_network
    depends_on:
      postgres_warehouse:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
      external_bank_sim:
        condition: service_started
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_operators &&
             python manage.py runserver 0.0.0.0:8000"

  background_worker:
    build:
      context: .
      dockerfile: adapter/Dockerfile
    container_name: background_worker
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-teamsec-dev-secret-key}
      POSTGRES_HOST: postgres_warehouse
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-teamsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamsec_secret}
      POSTGRES_DB: ${POSTGRES_DB:-teamsec_warehouse}
      REDIS_URL: redis://redis_broker:6379/0
      CELERY_BROKER_URL: redis://redis_broker:6379/0
      CELERY_RESULT_BACKEND: redis://redis_broker:6379/1
      EXTERNAL_BANK_URL: http://externalbank:8080
      PYTHONPATH: /app/api
    volumes:
      - ./api:/app/api
      - ./adapter:/app/adapter
    networks:
      - teamsec_network
    depends_on:
      postgres_warehouse:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
      core_backend_api:
        condition: service_started
    command: celery -A config worker --loglevel=info

networks:
  teamsec_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
