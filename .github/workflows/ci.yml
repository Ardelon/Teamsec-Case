name: CI

on:
  push:
    paths:
      - "project/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "project/**"
      - ".github/workflows/ci.yml"

jobs:
  rust-adapter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/adapter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        env:
          PYO3_PYTHON: python
        run: cargo test --lib

  django-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: teamsec
          POSTGRES_PASSWORD: teamsec_secret
          POSTGRES_DB: teamsec_warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teamsec -d teamsec_warehouse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: teamsec
      POSTGRES_PASSWORD: teamsec_secret
      POSTGRES_DB: teamsec_warehouse
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test tests -v 2
